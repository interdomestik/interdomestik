features.multi_agent = true
approval_policy = "on-request"
sandbox_mode = "workspace-write"

run_with_default_db_url_script = "scripts/run-with-default-db-url.mjs"
evidence_root = "/tmp/interdomestik-pilot-evidence"

[agents]
max_threads = 5
max_depth = 1

[profiles.prepr]
model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

[mcp_servers.openai_docs]
url = "https://developers.openai.com/mcp"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.playwright]
command = "npx"
args = [
  "-y",
  "@playwright/mcp",
  "--sandbox",
  "--user-data-dir",
  "/tmp/interdomestik-pilot-evidence/playwright-mcp-profile",
  "--output-dir",
  "/tmp/interdomestik-pilot-evidence/playwright-mcp-output",
]

[mcp_servers.interdomestik_qa]
command = "/bin/bash"
args = ["/Users/arbenlila/development/interdomestik-crystal-home/scripts/start-repo-qa.sh"]
env = { MCP_ENABLED_TOOLS = "project_map, read_files, read_file_range, code_search, git_status_compact, git_branch_info, changed_files, scope_audit, check_health, pr_verify, security_guard, e2e_gate" }

[roles.scribe]
config = ".codex/agents/scribe.toml"
enabled = true

[roles.atlas]
config = ".codex/agents/atlas.toml"
enabled = true

[roles.forge]
config = ".codex/agents/forge.toml"
enabled = true

[roles.pixel]
config = ".codex/agents/pixel.toml"
enabled = true

[roles.gatekeeper]
config = ".codex/agents/gatekeeper.toml"
enabled = true

[roles.sentinel]
config = ".codex/agents/sentinel.toml"
enabled = true

[roles.runway]
config = ".codex/agents/runway.toml"
enabled = true

[roles.security_reviewer]
config = ".codex/agents/security_reviewer.toml"
enabled = true

[roles.architect_reviewer]
config = ".codex/agents/architect_reviewer.toml"
enabled = true

[roles.qa_reviewer]
config = ".codex/agents/qa_reviewer.toml"
enabled = true

[roles.performance_reviewer]
config = ".codex/agents/performance_reviewer.toml"
enabled = true

[roles.contracts_reviewer]
config = ".codex/agents/contracts_reviewer.toml"
enabled = true

[project."/Users/arbenlila/development/interdomestik-crystal-home"]
trust_level = "trusted"
default_role = "scribe"
