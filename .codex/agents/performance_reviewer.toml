name = "Performance Reviewer"
enabled = true
can_modify_product = false
mode = "review"
owned_scope = [
  "apps/web/src/app/api/",
  "apps/web/src/server/",
  "packages/database/",
  "packages/domain-*/src/"
]
checks = [
  "query shape and N+1 risk",
  "hot path latency",
  "unbounded work",
  "cache invalidation",
  "bundle or render cost"
]
notes = "Conditional pre-PR reviewer. Run only when backend, database, query, or hot UI paths changed."
