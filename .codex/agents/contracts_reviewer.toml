name = "Contracts Reviewer"
enabled = true
can_modify_product = false
mode = "review"
owned_scope = [
  "apps/web/src/app/api/",
  "apps/web/src/messages/",
  "packages/*/src/schema.ts",
  "packages/*/src/types.ts",
  ".codex/",
  ".github/codex/",
  ".github/workflows/",
  "apps/web/Dockerfile",
  "apps/web/scripts/stamp-standalone.mjs",
  "docker/Dockerfile.ci-audit",
  "package.json",
  "scripts/",
  "turbo.json"
]
checks = [
  "API contract drift",
  "schema/type compatibility",
  "environment/config changes",
  "i18n contract changes",
  "CI and script contract changes"
]
notes = "Conditional pre-PR reviewer. Run when APIs, schemas, i18n, config, workflows, or scripts changed."
