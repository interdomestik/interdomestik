services:
  db:
    image: postgres:15-alpine
    container_name: interdomestik-sonar-db
    profiles:
      - sonar
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - interdomestik-net

  sonarqube:
    image: sonarqube:lts-community
    container_name: interdomestik-sonarqube
    profiles:
      - sonar
    depends_on:
      - db
    ports:
      - '9000:9000'
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - interdomestik-net

  web:
    # Parity Gate Mode: Runs production build
    profiles: ['gate']
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${DOCKER_GATE_SUPABASE_URL:-http://localhost:54321}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: interdomestik-web
    ports:
      - '3000:3000'
    env_file:
      - .env
      - docker/.env
    environment:
      # Override specific vars for Docker environment
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - S3_ENDPOINT=http://minio:9000
      - S3_PUBLIC_URL=http://localhost:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=claim-evidence
      - NEXT_PUBLIC_SUPABASE_URL=${DOCKER_GATE_SUPABASE_URL:-http://localhost:54321}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_APP_URL=http://127.0.0.1.nip.io:3000
      - NEXT_PUBLIC_SITE_URL=http://127.0.0.1.nip.io:3000
      - BETTER_AUTH_URL=http://127.0.0.1.nip.io:3000
      - BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://127.0.0.1.nip.io:3000,http://app.127.0.0.1.nip.io:3000,http://ks.127.0.0.1.nip.io:3000,http://mk.127.0.0.1.nip.io:3000,http://al.127.0.0.1.nip.io:3000,http://pilot.127.0.0.1.nip.io:3000
      - KS_HOST=ks.127.0.0.1.nip.io:3000
      - MK_HOST=mk.127.0.0.1.nip.io:3000
      - AL_HOST=al.127.0.0.1.nip.io:3000
      - PILOT_HOST=pilot.127.0.0.1.nip.io:3000
      - INTERDOMESTIK_AUTOMATED=1
      - PLAYWRIGHT=1
      - NEXT_PUBLIC_BILLING_TEST_MODE=1
      - SENTRY_DSN=
      - NEXT_PUBLIC_SENTRY_DSN=
      - UPSTASH_REDIS_REST_URL=
      - UPSTASH_REDIS_REST_TOKEN=
    depends_on:
      - redis
      - mailpit
      - minio
    networks:
      interdomestik-net:
        aliases:
          - 127.0.0.1.nip.io
          - app.127.0.0.1.nip.io
          - ks.127.0.0.1.nip.io
          - mk.127.0.0.1.nip.io
          - al.127.0.0.1.nip.io
          - pilot.127.0.0.1.nip.io

  playwright:
    profiles: ['gate']
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    container_name: interdomestik-playwright
    working_dir: /app
    volumes:
      - .:/app
      # Reuse stable gate caches instead of creating throwaway anonymous volumes.
      - playwright_pnpm_store:/pnpm-store
      - playwright_root_node_modules:/app/node_modules
      - playwright_web_node_modules:/app/apps/web/node_modules
    env_file:
      - .env
      - docker/.env
    environment:
      - CI=1
      - HUSKY=0
      - PNPM_STORE_DIR=/pnpm-store
      - PLAYWRIGHT_LOCALE=sq
      - BASE_URL=http://web:3000
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
    depends_on:
      - web
    entrypoint: ['/bin/bash']
    networks:
      - interdomestik-net
    ipc: host # Recommended for browser testing
    shm_size: '1gb'

  redis:
    profiles: ['infra', 'gate']
    image: redis:alpine
    container_name: interdomestik-redis
    ports:
      - '6379:6379'
    networks:
      - interdomestik-net

  mailpit:
    profiles: ['infra', 'gate']
    image: axllent/mailpit
    container_name: interdomestik-mailpit
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # UI
    networks:
      - interdomestik-net

  minio:
    profiles: ['infra', 'gate']
    image: minio/minio
    container_name: interdomestik-minio
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000' # API
      - '9001:9001' # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      # Critical for browser signed URLs to work via localhost
      - MINIO_SERVER_URL=http://localhost:9000
    volumes:
      - minio_data:/data
    networks:
      - interdomestik-net

  createbuckets:
    profiles: ['infra', 'gate']
    image: minio/mc
    container_name: interdomestik-createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb -p myminio/claim-evidence;
      /usr/bin/mc anonymous set public myminio/claim-evidence;
      exit 0;
      "
    networks:
      - interdomestik-net

  # Optional Postgres for self-contained stack
  # Run with: docker compose --profile db up
  postgres:
    image: postgres:15-alpine
    container_name: interdomestik-postgres
    profiles:
      - db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interdomestik
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - interdomestik-net

volumes:
  minio_data:
  postgres_data:
  playwright_pnpm_store:
  playwright_root_node_modules:
  playwright_web_node_modules:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_db_data:

networks:
  interdomestik-net:
    driver: bridge
