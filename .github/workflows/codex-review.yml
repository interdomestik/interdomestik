name: Codex Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: string
      base_ref:
        description: 'Base branch for the review'
        required: true
        type: string
      head_ref:
        description: 'Head branch for the review'
        required: true
        type: string

concurrency:
  group: codex-review-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  codex:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_ref }}
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        env:
          BASE_REF: ${{ inputs.base_ref }}
          HEAD_REF: ${{ inputs.head_ref }}
        run: |
          git check-ref-format --branch "${BASE_REF}"
          git check-ref-format --branch "${HEAD_REF}"
          git fetch --no-tags origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
            "+refs/heads/${HEAD_REF}:refs/remotes/origin/${HEAD_REF}"
          git checkout -B "${HEAD_REF}" "origin/${HEAD_REF}"

      - name: Check OPENAI_API_KEY availability
        id: openai_key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Codex review when OPENAI_API_KEY is unavailable
        if: steps.openai_key.outputs.configured != 'true'
        run: |
          echo "Skipping Codex review because OPENAI_API_KEY is not configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Run Codex
        id: run_codex
        if: steps.openai_key.outputs.configured == 'true'
        uses: openai/codex-action@c25d10f3f498316d4b2496cc4c6dd58057a7b031 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          model: gpt-5.4-mini
          effort: low
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write

      - name: Upload Codex review artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: codex-review-${{ github.run_id }}-${{ github.run_attempt }}
          path: codex-output.md
          if-no-files-found: ignore
          retention-days: 14

  post-feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const rawPrNumber = (process.env.PR_NUMBER ?? '').trim();
            const prNumber = Number.parseInt(rawPrNumber, 10);

            if (!Number.isInteger(prNumber) || prNumber <= 0 || String(prNumber) !== rawPrNumber) {
              throw new Error(`Invalid PR_NUMBER input: "${rawPrNumber}"`);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          PR_NUMBER: ${{ inputs.pr_number }}
