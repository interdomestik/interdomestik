name: PR Deterministic Backstops

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
      - name: Dependency Review
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high

  osv-scanner:
    name: OSV Scanner PR
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      fail-on-vuln: true
      scan-args: |-
        --recursive
        ./

  semgrep-ce:
    name: Semgrep CE Diff Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep
      - name: Run Semgrep against new PR findings
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          semgrep scan \
            --config p/ci \
            --baseline-commit "${BASE_SHA}" \
            --metrics=off \
            --error \
            --sarif \
            --output semgrep.sarif \
            .
      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  reviewdog-eslint:
    name: reviewdog ESLint Annotations
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: reviewdog/action-setup@38a8d76742a75eeb6c6ffc616bde64179fd09ebf # v1.5.0
      - name: Annotate web ESLint findings
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          eslint_status=0
          pnpm --filter @interdomestik/web exec eslint . -f json > eslint-web.json || eslint_status=$?
          reviewdog \
            -f=eslint \
            -name=eslint-web \
            -reporter=github-pr-check \
            -filter-mode=added \
            -fail-level=none < eslint-web.json
          exit 0
