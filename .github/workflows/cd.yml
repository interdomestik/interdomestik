name: CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: [self-hosted, interdomestik-linux]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=https://app.interdomestik.com

  deploy-staging:
    needs: build-push
    runs-on: [self-hosted, interdomestik-linux]
    environment:
      name: staging
      url: https://staging.interdomestik.com
    steps:
      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying image ${{ needs.build-push.outputs.image_tag }} to Staging..."
          # Example: ssh user@staging "docker pull ... && docker compose up -d"
          # or: kubectl set image deployment/web web=...

  e2e-staging:
    needs: deploy-staging
    runs-on: [self-hosted, interdomestik-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run Smoke Tests against Staging
        env:
          BASE_URL: https://staging.interdomestik.com
        run: |
          echo "🧪 Running smoke tests against $BASE_URL..."
          # pnpm test:e2e:smoke

  deploy-production:
    needs: e2e-staging
    runs-on: [self-hosted, interdomestik-linux]
    environment:
      name: production
      url: https://app.interdomestik.com
    steps:
      - name: Deploy to Production
        run: |
          echo "🚀 Deploying image ${{ needs.build-push.outputs.image_tag }} to Production..."
          # Actual deployment command here

  verify-production:
    needs: deploy-production
    runs-on: [self-hosted, interdomestik-linux]
    timeout-minutes: 20
    env:
      BASE_URL: https://app.interdomestik.com
      EVIDENCE_DIR: tmp/cd-evidence/${{ github.run_id }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG || secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || secrets.SENTRY_PROJECT }}
      SENTRY_ENVIRONMENT: production
      SENTRY_SEVERITY_THRESHOLD: error
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Validate optional Sentry Seer configuration
        shell: bash
        run: |
          set -euo pipefail
          sentry_vars=(SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT)
          sentry_missing=()

          for name in "${sentry_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              sentry_missing+=("${name}")
            fi
          done

          if (( ${#sentry_missing[@]} == 0 )); then
            echo "SENTRY_SEER_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::Skipping Sentry Seer sweep due to missing configuration: ${sentry_missing[*]}"
            echo "SENTRY_SEER_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Open Sentry Seer sweep window
        if: env.SENTRY_SEER_ENABLED == 'true'
        shell: bash
        env:
          SENTRY_SWEEP_CONTEXT: post-deploy verification
        run: bash scripts/sentry-seer-sweep.sh pre

      - name: Health Check
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=30
          sleep_seconds=5

          for attempt in $(seq 1 "${max_attempts}"); do
            echo "🏥 Attempt ${attempt}/${max_attempts}: checking health of ${BASE_URL}..."

            if curl -fsS "${BASE_URL}/api/health"; then
              echo "✅ Health check succeeded on attempt ${attempt}."
              exit 0
            fi

            if [[ "${attempt}" -lt "${max_attempts}" ]]; then
              echo "Health check failed on attempt ${attempt}, retrying in ${sleep_seconds}s..."
              sleep "${sleep_seconds}"
            fi
          done

          echo "❌ Health check failed after ${max_attempts} attempts."
          exit 1

      - name: Close Sentry Seer sweep window
        if: always() && env.SENTRY_SEER_ENABLED == 'true'
        continue-on-error: true
        shell: bash
        env:
          SENTRY_SWEEP_CONTEXT: post-deploy verification
        run: bash scripts/sentry-seer-sweep.sh post

      - name: Upload production verification artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: production-verification-${{ github.run_id }}
          path: |
            ${{ env.EVIDENCE_DIR }}/logs/*
            ${{ env.EVIDENCE_DIR }}/notes/*
          if-no-files-found: warn
          retention-days: 14
