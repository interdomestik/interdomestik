name: Commitlint

on:
  pull_request:
    branches:
      - '**'

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint commits
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          if [[ "${PR_AUTHOR_LOGIN}" == "dependabot[bot]" ]]; then
            TRANSFORMED_TITLE="${PR_TITLE}"
            if ! printf '%s\n' "${TRANSFORMED_TITLE}" | grep -Eq '^[a-z][a-z0-9-]*(\([^)]+\))?!?:[[:space:]]'; then
              NORMALIZED_TITLE="$(printf '%s' "${PR_TITLE}" | tr '[:upper:]' '[:lower:]')"
              TRANSFORMED_TITLE="chore(deps): ${NORMALIZED_TITLE}"
            fi
            printf '%s\n' "${TRANSFORMED_TITLE}" | pnpm exec commitlint
          else
            pnpm exec commitlint --from "${BASE_SHA}" --to "${HEAD_SHA}"
          fi
