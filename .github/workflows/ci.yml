name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  DATABASE_URL: ${{ secrets.E2E_DATABASE_URL || 'postgresql://postgres:postgres@127.0.0.1:5432/interdomestik_test' }}
  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-secret-for-ci-only-do-not-use-in-production' }}
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  BETTER_AUTH_URL: http://127.0.0.1:3000
  PORT: 3000
  CI: 'true'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}

jobs:
  validation-surface:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.validation_surface.outputs.should_run }}
      reason: ${{ steps.validation_surface.outputs.reason }}
      non_product_only_paths: ${{ steps.validation_surface.outputs.non_product_only_paths }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false
      - name: Evaluate validation surface
        id: validation_surface
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files_path="$(mktemp)"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            node scripts/ci/github-pr-files.mjs \
              --event-path "${GITHUB_EVENT_PATH}" >"${changed_files_path}"
          fi
          node scripts/ci/validation-surface-policy.mjs \
            --event-name "${{ github.event_name }}" \
            --changed-files-path "${changed_files_path}" >>"$GITHUB_OUTPUT"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Run Audits
        run: |
          node scripts/check-env-ci.mjs
          pnpm test:ci:contracts
          pnpm track:audit
          pnpm plan:audit
          pnpm purity:audit
          pnpm db:migrations:check-journal
          # Contract Compliance: pnpm check remains the Golden Path marker.
          # Browser PR coverage lives in the dedicated PR E2E workflow.
          # Push/mainline gate coverage stays in the e2e-gate job below.

  static:
    needs:
      - validation-surface
    if: needs.validation-surface.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Static Checks
        run: |
          pnpm -w lint
          pnpm -w type-check
          pnpm -w check:entrypoints:strict
          pnpm -w i18n:check
          pnpm -w i18n:purity:check --report=tmp/i18n-purity/ci-static-report.json
      - name: Upload i18n purity report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: i18n-purity-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: tmp/i18n-purity/
          if-no-files-found: ignore
          retention-days: 30

  unit:
    needs:
      - validation-surface
    if: needs.validation-surface.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Coverage Gate
        env:
          UPSTASH_REDIS_REST_URL: http://localhost:8080
          UPSTASH_REDIS_REST_TOKEN: dummy-token
        run: pnpm coverage:gate
      - name: Release Gate Unit Tests
        run: pnpm test:release-gate

  e2e-gate:
    needs:
      - validation-surface
    if: needs.validation-surface.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: interdomestik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d interdomestik_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      E2E_API_SECRET: test-secret-placeholder
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          install-playwright: ${{ github.event_name != 'pull_request' }}

      - name: Enforce E2E Best Practices
        if: github.event_name != 'pull_request'
        run: |
          if grep -r "page.goto" apps/web/e2e/gate apps/web/e2e/golden | grep -v "tenant-resolution.spec.ts"; then
            echo "❌ Strict Gate Violation: Raw page.goto found. Use gotoApp() instead."
            exit 1
          fi

      - name: Prepare E2E Database
        run: |
          pnpm db:migrate
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            pnpm seed:e2e
            pnpm seed:assert-e2e
          fi

      - name: RLS Integration Test
        env:
          REQUIRE_RLS_INTEGRATION: '1'
        run: pnpm db:rls:test

      - name: E2E Gate Suite
        if: github.event_name != 'pull_request'
        run: pnpm e2e:gate
