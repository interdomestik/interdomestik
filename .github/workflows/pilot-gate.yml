name: Pilot Gate

on:
  pull_request:
    branches:
      - main
    # Protected checks must always materialize on PRs; the validation-surface
    # policy below skips heavy work for docs-only and other non-product changes.
  workflow_dispatch:

concurrency:
  group: pilot-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pilot-gate-preflight:
    name: Pilot Gate Preflight
    permissions:
      checks: read
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.validation_surface.outputs.should_run }}
      reason: ${{ steps.validation_surface.outputs.reason }}
      non_product_only_paths: ${{ steps.validation_surface.outputs.non_product_only_paths }}
      sonar_gate_enabled: ${{ steps.validate_secrets.outputs.sonar_gate_enabled }}
      needs_manual_sonar_fallback: ${{ steps.sonar_strategy.outputs.needs_manual_sonar_fallback }}
      needs_dependabot_better_auth_fallback: ${{ steps.validate_secrets.outputs.needs_dependabot_better_auth_fallback }}
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}
      PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login || '' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Evaluate validation surface
        id: validation_surface
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files_path="$(mktemp)"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            node scripts/ci/github-pr-files.mjs \
              --event-path "${GITHUB_EVENT_PATH}" >"${changed_files_path}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git fetch --no-tags origin main --depth=1
            git diff --name-only origin/main...HEAD >"${changed_files_path}"
          fi
          node scripts/ci/validation-surface-policy.mjs \
            --event-name "${{ github.event_name }}" \
            --changed-files-path "${changed_files_path}" >>"$GITHUB_OUTPUT"

      - name: Skip pilot gate for non-product-only changes
        if: steps.validation_surface.outputs.should_run != 'true'
        run: |
          echo "Skipping pilot gate."
          echo "Reason: ${{ steps.validation_surface.outputs.reason }}"
          echo "Non-product-only paths: ${{ steps.validation_surface.outputs.non_product_only_paths }}"

      - name: Validate required gate secrets
        id: validate_secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.validation_surface.outputs.should_run }}" != "true" ]]; then
            echo "sonar_gate_enabled=false" >> "$GITHUB_OUTPUT"
            echo "needs_dependabot_better_auth_fallback=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${BETTER_AUTH_SECRET:-}" ]]; then
            if [[ "${PR_AUTHOR_LOGIN:-}" == "dependabot[bot]" ]]; then
              echo "::warning::BETTER_AUTH_SECRET unavailable for Dependabot. Heavy gate will generate a per-run CI fallback secret."
              echo "needs_dependabot_better_auth_fallback=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Missing required secret: BETTER_AUTH_SECRET"
              exit 2
            fi
          else
            echo "needs_dependabot_better_auth_fallback=false" >> "$GITHUB_OUTPUT"
          fi

          sonar_vars=(SONAR_TOKEN SONAR_HOST_URL SONAR_PROJECT_KEY)
          if [[ "${SONAR_HOST_URL:-}" == *"sonarcloud.io"* ]]; then
            sonar_vars+=(SONAR_ORGANIZATION)
          fi
          sonar_missing=()

          for name in "${sonar_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              sonar_missing+=("${name}")
            fi
          done

          if (( ${#sonar_missing[@]} == 0 )); then
            echo "sonar_gate_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping Sonar gate due to missing configuration: ${sonar_missing[*]}"
            echo "sonar_gate_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Await SonarCloud Code Analysis check
        id: await_sonar_check
        if: github.event_name == 'pull_request' && steps.validation_surface.outputs.should_run == 'true' && steps.validate_secrets.outputs.sonar_gate_enabled == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          SONAR_CHECK_SHA: ${{ github.event.pull_request.head.sha }}
          SONAR_CHECK_MAX_RETRIES: '6'
          SONAR_CHECK_RETRY_DELAY_SECONDS: '10'
        run: bash scripts/sonar-check-run-gate.sh

      - name: Decide Sonar gate strategy
        id: sonar_strategy
        shell: bash
        run: |
          set -euo pipefail
          needs_manual_sonar_fallback=false

          if [[ "${{ steps.validation_surface.outputs.should_run }}" == "true" && \
                "${{ steps.validate_secrets.outputs.sonar_gate_enabled }}" == "true" && \
                "${{ github.event_name }}" == "pull_request" && \
                "${{ steps.await_sonar_check.outcome }}" != "success" ]]; then
            needs_manual_sonar_fallback=true
            echo "::warning::External SonarCloud PR check did not complete. Falling back to in-repo Sonar analysis."
          fi

          echo "needs_manual_sonar_fallback=${needs_manual_sonar_fallback}" >> "$GITHUB_OUTPUT"

  pilot-gate-runner:
    name: Pilot Gate Runner
    needs:
      - pilot-gate-preflight
    if: needs.pilot-gate-preflight.outputs.should_run == 'true'
    permissions:
      checks: read
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: interdomestik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d interdomestik_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      CI: 'true'
      PLAYWRIGHT: '1'
      PORT: 3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      BETTER_AUTH_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/interdomestik_test
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      SONAR_GATE_ENABLED: ${{ needs.pilot-gate-preflight.outputs.sonar_gate_enabled }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG || secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || secrets.SENTRY_PROJECT }}
      RELEASE_GATE_MEMBER_EMAIL: member.ks.a1@interdomestik.com
      RELEASE_GATE_MEMBER_PASSWORD: GoldenPass123!
      RELEASE_GATE_AGENT_EMAIL: agent.ks.a1@interdomestik.com
      RELEASE_GATE_AGENT_PASSWORD: GoldenPass123!
      RELEASE_GATE_STAFF_EMAIL: staff.ks@interdomestik.com
      RELEASE_GATE_STAFF_PASSWORD: GoldenPass123!
      RELEASE_GATE_ADMIN_KS_EMAIL: admin.ks@interdomestik.com
      RELEASE_GATE_ADMIN_KS_PASSWORD: GoldenPass123!
      RELEASE_GATE_ADMIN_MK_EMAIL: admin.mk@interdomestik.com
      RELEASE_GATE_ADMIN_MK_PASSWORD: GoldenPass123!
      RELEASE_GATE_MK_USER_URL: ''
      RELEASE_GATE_TARGET_USER_URL: /admin/users/golden_mk_admin?tenantId=tenant_mk
      RELEASE_GATE_REQUIRE_ROLE_PANEL: 'false'
      STAFF_CLAIM_URL: ''
      RELEASE_GATE_REQUIRE_STAFF_CLAIM_URL: 'false'
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}
      SONAR_PULLREQUEST_KEY: ${{ github.event.pull_request.number || '' }}
      SONAR_PULLREQUEST_BRANCH: ${{ github.event.pull_request.head.ref || '' }}
      SONAR_PULLREQUEST_BASE: ${{ github.event.pull_request.base.ref || '' }}
      SONAR_SCANNER_SKIP_JRE_PROVISIONING: 'true'
      EVIDENCE_DIR: tmp/pilot-evidence/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v5

      - name: Generate BETTER_AUTH_SECRET fallback for Dependabot
        if: needs.pilot-gate-preflight.outputs.needs_dependabot_better_auth_fallback == 'true'
        shell: bash
        run: |
          set -euo pipefail
          fallback_secret="$(openssl rand -hex 32)"
          echo "::add-mask::${fallback_secret}"
          echo "BETTER_AUTH_SECRET=${fallback_secret}" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup
        with:
          install-playwright: true

      - name: Run Sonar quality gate (manual fallback)
        if: env.SONAR_GATE_ENABLED == 'true' && (github.event_name != 'pull_request' || needs.pilot-gate-preflight.outputs.needs_manual_sonar_fallback == 'true')
        env:
          SONAR_ENFORCEMENT: enforce
          SONAR_RUN_COVERAGE: true
        run: bash scripts/sonar-gate.sh

      - name: Upload Sonar gate artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: sonarqube-gate-${{ github.run_id }}
          path: |
            ${{ env.EVIDENCE_DIR }}/logs/sonar-scan.log
            ${{ env.EVIDENCE_DIR }}/logs/sonar-qualitygate.json
            ${{ env.EVIDENCE_DIR }}/notes/sonar-summary.md
          if-no-files-found: warn
          retention-days: 14

      - name: Prepare CI database
        shell: bash
        run: |
          set -euo pipefail
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done
          pnpm db:migrate
          pnpm seed:e2e
          pnpm seed:assert-e2e

      - name: Build web standalone artifact
        run: pnpm --filter @interdomestik/web run build:ci

      - name: Start web server for release gate
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @interdomestik/web run start:ci > /tmp/web-start.log 2>&1 &
          echo $! > /tmp/web-start.pid
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::Web server failed to become healthy on 127.0.0.1:3000"
          cat /tmp/web-start.log || true
          exit 1

      - name: Run pilot gate
        run: pnpm -s release:gate:p0:raw --baseUrl http://127.0.0.1:3000

      - name: Stop web server
        if: always()
        shell: bash
        run: |
          if [[ -f /tmp/web-start.pid ]]; then
            kill "$(cat /tmp/web-start.pid)" || true
          fi

      - name: Upload release gate reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: pilot-gate-reports
          path: docs/release-gates/*.md
          if-no-files-found: warn
          retention-days: 14

  pilot-gate:
    name: pr:verify + pilot:check
    if: always()
    needs:
      - pilot-gate-preflight
      - pilot-gate-runner
    runs-on: ubuntu-latest
    steps:
      - name: Enforce pilot gate preflight/result contract
        shell: bash
        run: |
          set -euo pipefail
          preflight_result="${{ needs.pilot-gate-preflight.result }}"
          should_run="${{ needs.pilot-gate-preflight.outputs.should_run }}"
          reason="${{ needs.pilot-gate-preflight.outputs.reason }}"
          runner_result="${{ needs.pilot-gate-runner.result }}"

          if [[ "${preflight_result}" != "success" ]]; then
            echo "::error::Pilot gate preflight failed before the heavy runner became eligible."
            exit 1
          fi

          if [[ "${should_run}" != "true" ]]; then
            echo "Pilot gate skipped."
            echo "Reason: ${reason}"
            exit 0
          fi

          if [[ "${runner_result}" != "success" ]]; then
            echo "::error::Pilot gate runner did not complete successfully (result=${runner_result})."
            exit 1
          fi

  multi-agent-policy:
    name: Multi-Agent Policy
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}
      reason: ${{ steps.evaluate.outputs.reason }}
      matched_paths: ${{ steps.evaluate.outputs.matched_paths }}
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Evaluate full multi-agent hardening policy
        id: evaluate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files_path="$(mktemp)"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            node scripts/ci/github-pr-files.mjs \
              --event-path "${GITHUB_EVENT_PATH}" >"${changed_files_path}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git fetch --no-tags origin main --depth=1
            git diff --name-only origin/main...HEAD >"${changed_files_path}"
          fi
          node scripts/ci/multi-agent-policy.mjs \
            --event-name "${{ github.event_name }}" \
            --event-path "${GITHUB_EVENT_PATH}" \
            --changed-files-path "${changed_files_path}" >>"$GITHUB_OUTPUT"

      - name: Print policy decision
        shell: bash
        run: |
          echo "should_run=${{ steps.evaluate.outputs.should_run }}"
          echo "reason=${{ steps.evaluate.outputs.reason }}"
          echo "matched_paths=${{ steps.evaluate.outputs.matched_paths }}"

  multi-agent-pr-hardening:
    name: Multi-Agent PR Hardening + Merge Gate
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]') && needs.multi-agent-policy.outputs.should_run == 'true' }}
    needs:
      - pilot-gate
      - multi-agent-policy
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: interdomestik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d interdomestik_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      CI: 'true'
      PLAYWRIGHT: '1'
      PORT: 3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      BETTER_AUTH_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/interdomestik_test
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          install-playwright: true

      - name: Prepare CI database
        shell: bash
        run: |
          set -euo pipefail
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done
          pnpm db:migrate
          pnpm seed:e2e
          pnpm seed:assert-e2e

      - name: Run full PR hardening pipeline
        id: harden
        shell: bash
        run: |
          set -euo pipefail
          cmd=(bash scripts/multi-agent/orchestrator.sh --pipeline pr-hardening --no-auto-remediate --agent-timeout-seconds 600)
          if [[ -n "${{ github.event.pull_request.number || '' }}" ]]; then
            cmd+=(--pr "${{ github.event.pull_request.number }}")
          fi
          "${cmd[@]}"

      - name: Enforce multi-agent merge gate
        shell: bash
        run: |
          set -euo pipefail
          run_root="${{ steps.harden.outputs.pr_hardening_run_root }}"
          if [[ -z "${run_root}" ]]; then
            echo "error: 'pr_hardening_run_root' output from 'harden' step is empty or unset." >&2
            echo "Check the full PR hardening step logs for early failures before merge-gate." >&2
            exit 1
          fi
          pnpm -s multiagent:merge-gate -- --run-root "${run_root}"

      - name: Upload multi-agent hardening artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: multi-agent-hardening-${{ github.run_id }}
          path: |
            ${{ steps.harden.outputs.pr_hardening_run_root }}/evidence/
            ${{ steps.harden.outputs.pr_hardening_run_root }}/prompts/
            ${{ steps.harden.outputs.pr_hardening_run_root }}/remediation/
            ${{ steps.harden.outputs.pr_hardening_run_root }}/trace.ndjson
            ${{ steps.harden.outputs.pr_hardening_run_root }}/run-manifest.md
            ${{ steps.harden.outputs.pr_hardening_run_root }}/dispatch-order.md
          if-no-files-found: warn
          retention-days: 14
