name: Secret Scan

on:
  push:
    branches:
      - main
      - master
      - 'rc/**'
      - 'release/**'
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail

          version="8.30.0"
          os="$(uname -s)"
          arch="$(uname -m)"

          case "${os}-${arch}" in
            Linux-x86_64) archive="gitleaks_${version}_linux_x64.tar.gz" ;;
            Linux-aarch64|Linux-arm64) archive="gitleaks_${version}_linux_arm64.tar.gz" ;;
            Darwin-x86_64) archive="gitleaks_${version}_darwin_x64.tar.gz" ;;
            Darwin-arm64) archive="gitleaks_${version}_darwin_arm64.tar.gz" ;;
            *)
              echo "Unsupported platform for gitleaks: ${os}-${arch}" >&2
              exit 1
              ;;
          esac

          mkdir -p "$HOME/.local/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}" -o "/tmp/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp gitleaks
          install /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gitleaks" version

      - name: Run gitleaks (blocking)
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          mkdir -p /tmp/gitleaks-artifacts
          log_opts="--all"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && -n "${GITHUB_BASE_SHA:-}" && -n "${GITHUB_HEAD_SHA:-}" ]]; then
            log_opts="${GITHUB_BASE_SHA}..${GITHUB_HEAD_SHA}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && -n "${GITHUB_BEFORE_SHA:-}" && "${GITHUB_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            log_opts="${GITHUB_BEFORE_SHA}..${GITHUB_SHA}"
          fi

          gitleaks git --redact --log-opts="${log_opts}" --report-format sarif --report-path /tmp/gitleaks-artifacts/gitleaks.sarif

      - name: Upload gitleaks report artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-gitleaks-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/gitleaks-artifacts/gitleaks.sarif
          if-no-files-found: warn
