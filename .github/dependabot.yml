version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 2
    groups:
      npm-production:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      npm-development:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
